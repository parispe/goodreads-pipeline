name: CI - DAG import test
on:
  push:
    branches: [ "main" ]
    paths:
      - "dags/**"
      - ".github/workflows/**"
  pull_request:
    branches: [ "main" ]
jobs:
  import-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Airflow with constraints
        run: |
          python -m pip install --upgrade pip
          CONSTRAINT_URL="https://raw.githubusercontent.com/apache/airflow/constraints-2.9.3/constraints-3.11.txt"
          pip install "apache-airflow==2.9.3" --constraint "${CONSTRAINT_URL}"
      - name: Airflow DB init (SQLite) & DAG import test
        env:
          AIRFLOW_HOME: ${{ github.workspace }}/.airflow
        run: |
          airflow db init
          airflow dags list
